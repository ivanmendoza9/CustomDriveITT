<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Panel Principal - Automodular</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="styles.css" />
		<style>
			.menu-container {
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: clamp(16px, 2vw, 24px);
				background: radial-gradient(circle at top left, rgba(31, 79, 138, 0.06), transparent 22%),
					linear-gradient(180deg, #f6f9fc 0%, #eef3f8 100%);
			}

			.menu-card {
				width: min(900px, 100%);
				max-height: 100vh;
				display: grid;
				gap: clamp(24px, 3vw, 40px);
			}

			.menu-header {
				text-align: center;
				padding: clamp(24px, 3vw, 42px);
			}

			.menu-header h1 {
				font-size: clamp(2.2rem, 4vw, 3.2rem);
				line-height: 1.05;
				margin: 12px 0 16px;
				color: var(--text);
			}

			.menu-header p {
				color: var(--muted);
				font-size: 16px;
				line-height: 1.6;
				margin-bottom: 8px;
			}

			.menu-header .user-name {
				color: var(--primary);
				font-weight: 600;
			}

			.menu-options {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
				gap: clamp(16px, 2vw, 24px);
			}

			.menu-option {
				background: var(--panel);
				border: 2px solid var(--line);
				border-radius: var(--radius-xl);
				padding: clamp(24px, 3vw, 40px);
				box-shadow: var(--shadow);
				cursor: pointer;
				transition: all 0.3s ease;
				text-decoration: none;
				display: flex;
				flex-direction: column;
				gap: 16px;
			}

			.menu-option:hover {
				transform: translateY(-4px);
				border-color: var(--primary);
				box-shadow: 0 24px 48px rgba(31, 79, 138, 0.12);
			}

			.menu-option-icon {
				font-size: 48px;
				line-height: 1;
			}

			.menu-option-title {
				font-size: 22px;
				font-weight: 700;
				color: var(--text);
			}

			.menu-option-description {
				color: var(--muted);
				font-size: 14px;
				line-height: 1.6;
				flex-grow: 1;
			}

			.menu-option-badge {
				display: inline-flex;
				align-items: center;
				width: fit-content;
				padding: 6px 10px;
				border-radius: 999px;
				background: var(--accent);
				color: var(--primary);
				font-size: 11px;
				font-weight: 700;
				letter-spacing: 0.04em;
			}

			.menu-footer {
				text-align: center;
				color: var(--muted);
				font-size: 13px;
				margin-top: 16px;
			}

			.menu-footer a {
				color: var(--primary);
				text-decoration: none;
				font-weight: 600;
			}

			.menu-footer a:hover {
				text-decoration: underline;
			}

			@media (max-width: 768px) {
				.menu-card {
					gap: 16px;
				}

				.menu-option {
					padding: 20px;
				}

				.menu-header p {
					font-size: 14px;
				}
			}
		</style>
	</head>
	<body>
		<div class="menu-container">
			<div class="menu-card">
				<div class="menu-header">
					<span class="kicker">Panel Principal</span>
					<h1>Bienvenido, <span class="user-name" id="nombreUsuario">Usuario</span></h1>
					<p>Elige qué deseas hacer hoy</p>
				</div>

				<div class="menu-options">
					<!-- Opción Vendedor -->
					<a href="index.html" class="menu-option">
						<div class="menu-option-icon">🏪</div>
						<div>
							<div class="menu-option-title">Plataforma de Venta</div>
							<div class="menu-option-description">Configura y vende vehículos personalizados con miles de opciones.</div>
							<div class="menu-option-badge">VENDEDOR</div>
						</div>
					</a>

					<!-- Opción Propietario -->
					<a href="owner-config.html" class="menu-option">
						<div class="menu-option-icon">🚗</div>
						<div>
							<div class="menu-option-title">Panel de Propietario</div>
							<div class="menu-option-description">Simula y personaliza la configuración de tu vehículo (asientos, volante, espejos).</div>
							<div class="menu-option-badge">PROPIETARIO</div>
						</div>
					</a>
				</div>

				<div class="menu-footer">
					<a href="#" onclick="cerrarSesion(); return false;">← Cerrar sesión</a>
				</div>
			</div>
		</div>

		<script>
			// Cargar nombre del usuario desde localStorage
			document.addEventListener('DOMContentLoaded', function () {
				const nombreStorage = localStorage.getItem('nombreUsuario');
				if (nombreStorage) {
					document.getElementById('nombreUsuario').textContent = nombreStorage;
				} else {
					// Si no hay nombre, redirigir al login
					window.location.href = 'index.html';
				}
			});

			function cerrarSesion() {
				localStorage.removeItem('nombreUsuario');
				window.location.href = 'index.html';
			}
		</script>
	</body>
</html>
