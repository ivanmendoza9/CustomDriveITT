<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seguimiento de entrega</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: #f4f7fb; }
    .delivery-page {
      max-width: 700px;
      margin: 40px auto;
      background: #fff;
      border: 1px solid #dbe4ee;
      border-radius: 18px;
      box-shadow: 0 18px 40px rgba(15, 35, 60, 0.08);
      padding: 22px;
    }
    .delivery-page h1 { margin-bottom: 14px; }
    .delivery-steps { list-style: none; padding: 0; margin: 24px 0; }
    .delivery-steps li { margin-bottom: 14px; display:flex; align-items:center; gap: 10px; }
    .dot { width: 16px; height: 16px; border-radius: 50%; background: #c7d3e0; transition: background 0.3s ease; }
    .dot.active { background: #1f4f8a; }
    .progress-bar {
      position: relative;
      width: 100%;
      height: 20px;
      border-radius: 999px;
      background: #eef3f9;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .progress-bar-fill {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, #1f4f8a, #4a75b8);
      transition: width 1s ease;
    }
    .delivery-status-text { font-weight: 600; }
  </style>
</head>
<body>
  <div class="delivery-page">
    <h1>Seguimiento de entrega</h1>
    <p class="delivery-status-text" id="status-text">Tu pedido está siendo procesado...</p>
    <div class="progress-bar">
      <div id="progressfill" class="progress-bar-fill"></div>
    </div>
    <ul class="delivery-steps">
      <li><span id="dot1" class="dot active"></span><span>Orden recibida</span></li>
      <li><span id="dot2" class="dot"></span><span>Preparando para envío</span></li>
      <li><span id="dot3" class="dot"></span><span>En ruta</span></li>
      <li><span id="dot4" class="dot"></span><span>Entregado</span></li>
    </ul>
    <small style="color:#5f7187;">Ventana de seguimiento actualizada automáticamente.</small>
  </div>

  <script>
    const steps = [
      { text: 'Orden recibida', pct: 25, dot:'dot1' },
      { text: 'Preparando para envío', pct: 50, dot:'dot2' },
      { text: 'En ruta', pct: 75, dot:'dot3' },
      { text: 'Entregado', pct: 100, dot:'dot4' }
    ];
    let i=0;
    const fill = document.getElementById('progressfill');
    const status = document.getElementById('status-text');

    const interval = setInterval(() => {
      if (i >= steps.length) {
        clearInterval(interval);
        status.textContent = '✅ Entregado. ¡Disfruta tu auto!';
        return;
      }
      const step = steps[i];
      fill.style.width = step.pct + '%';
      status.textContent = '🔄 ' + step.text;
      document.getElementById(step.dot).classList.add('active');
      i++;
    }, 1800);
  </script>
</body>
</html>
